name: Build and Release Action

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: gp-upload-action-linux-x64
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: gp-upload-action-linux-arm64
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: gp-upload-action-windows-x64.exe
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: gp-upload-action-macos-arm64
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (Linux ARM64)
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Binary (Standard)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build Binary (Cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename Artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: cp target/${{ matrix.target }}/release/gp-upload-action.exe ${{ matrix.artifact_name }}

      - name: Rename Artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/gp-upload-action ${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release and Upload Assets
        id: release
        uses: caffeine-soft/github-release-tag@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          generate_release: "true"
          release_name: "Release {tag}"
          artifacts: |
            dist/gp-upload-action-linux-x64
            dist/gp-upload-action-linux-arm64
            dist/gp-upload-action-windows-x64.exe
            dist/gp-upload-action-macos-arm64

      - name: Update Major Tag
        run: |
          MAJOR_VERSION=$(echo "${{ steps.release.outputs.new_tag }}" | cut -d. -f1)
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -fa "$MAJOR_VERSION" -m "Update major tag $MAJOR_VERSION"
          git push origin "$MAJOR_VERSION" --force
