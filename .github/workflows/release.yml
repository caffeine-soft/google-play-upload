name: Build and Release Action

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install musl-tools (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y musl-tools

      - name: Build Binary (Windows/macOS)
        if: matrix.os != 'ubuntu-latest'
        run: cargo build --release

      - name: Build Binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          rustup target add x86_64-unknown-linux-musl
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Rename Artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: cp target/release/gp-upload-action.exe gp-upload-action-windows.exe

      - name: Rename Artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: cp target/release/gp-upload-action gp-upload-action-macos

      - name: Rename Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cp target/x86_64-unknown-linux-musl/release/gp-upload-action gp-upload-action-linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-binary
          path: gp-upload-action-*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release and Upload Assets
        id: release
        uses: caffeine-soft/github-release-tag@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          generate_release: "true"
          release_name: "Release {tag}"
          artifacts: |
            dist/gp-upload-action-linux
            dist/gp-upload-action-windows.exe
            dist/gp-upload-action-macos

      - name: Update Major Tag
        run: |
          MAJOR_VERSION=$(echo "${{ steps.release.outputs.new_tag }}" | cut -d. -f1)
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -fa "$MAJOR_VERSION" -m "Update major tag $MAJOR_VERSION"
          git push origin "$MAJOR_VERSION" --force
