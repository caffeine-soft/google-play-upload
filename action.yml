name: "Native Rust Play Store Upload"
description: "Upload to Google Play without Docker or Node.js"

branding:
  icon: "upload-cloud"
  color: "green"

inputs:
  packageName:
    required: true
    description: "Android package name"
  track:
    required: true
    description: "Release track (e.g. production, internal)"
  status:
    required: false
    default: "completed"
    description: "Release status (e.g. completed, draft, inProgress)"
  releaseFile:
    required: false
    description: "Path to .aab or .apk"
  releaseFiles:
    required: false
    description: "Path to .aab or .apk (alias for releaseFile)"
  serviceAccountJsonPlainText:
    required: true
    description: "GCP Service Account JSON"

runs:
  using: "composite"
  steps:
    - name: Download Binary
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        REPO="${{ github.action_repository }}"
        if [[ -z "$REPO" ]]; then
          REPO="caffeine-soft/google-play-upload"
        fi

        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)
            ASSET_PATTERN="gp-upload-action-linux-x64"
            FALLBACK_PATTERN="gp-upload-action-linux"
            BINARY_NAME="gp-upload-action"
            ;;
          Linux-ARM64)
            ASSET_PATTERN="gp-upload-action-linux-arm64"
            FALLBACK_PATTERN="gp-upload-action-linux"
            BINARY_NAME="gp-upload-action"
            ;;
          Windows-X64)
            ASSET_PATTERN="gp-upload-action-windows-x64.exe"
            FALLBACK_PATTERN="gp-upload-action-windows.exe"
            BINARY_NAME="gp-upload-action.exe"
            ;;
          macOS-X64)
            ASSET_PATTERN="gp-upload-action-macos-x64"
            FALLBACK_PATTERN="gp-upload-action-macos"
            BINARY_NAME="gp-upload-action"
            ;;
          macOS-ARM64)
            ASSET_PATTERN="gp-upload-action-macos-arm64"
            FALLBACK_PATTERN="gp-upload-action-macos"
            BINARY_NAME="gp-upload-action"
            ;;
          *)
            echo "Unsupported OS/Arch: ${{ runner.os }}-${{ runner.arch }}"
            exit 1
            ;;
        esac

        TARGET_TAG="${{ github.action_ref }}"
        if [[ -z "$TARGET_TAG" || "$TARGET_TAG" == "main" ]]; then
          echo "Downloading latest release..."
          if ! gh release download --repo "$REPO" --pattern "$ASSET_PATTERN"; then
            echo "Primary asset not found, trying fallback..."
            gh release download --repo "$REPO" --pattern "$FALLBACK_PATTERN"
            mv "$FALLBACK_PATTERN" "$ASSET_PATTERN"
          fi
        else
          echo "Downloading release for tag $TARGET_TAG..."
          # gh CLI автоматически разрешает теги, включая мажорные
          if ! gh release download "$TARGET_TAG" --repo "$REPO" --pattern "$ASSET_PATTERN"; then
            echo "Primary asset not found, trying fallback..."
            gh release download "$TARGET_TAG" --repo "$REPO" --pattern "$FALLBACK_PATTERN"
            mv "$FALLBACK_PATTERN" "$ASSET_PATTERN"
          fi
        fi
        
        mv "$ASSET_PATTERN" "$BINARY_NAME"
        chmod +x "$BINARY_NAME"

    - name: Execute Action
      shell: bash
      env:
        INPUT_PACKAGENAME: ${{ inputs.packageName }}
        INPUT_TRACK: ${{ inputs.track }}
        INPUT_STATUS: ${{ inputs.status }}
        INPUT_RELEASEFILE: ${{ inputs.releaseFile || inputs.releaseFiles }}
        INPUT_SERVICEACCOUNTJSONPLAINTEXT: ${{ inputs.serviceAccountJsonPlainText }}
      run: |
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          ./gp-upload-action.exe
        else
          ./gp-upload-action
        fi
